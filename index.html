<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan KAS Mushola</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="container mx-auto p-4">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <h1 class="text-2xl md:text-3xl font-bold">
      Laporan KAS Mushola Al Ikhlas
    </h1>
    <p class="text-gray-600">Dusun Pahing Desa Cirahayu</p>
  </div>



  <!-- RINGKASAN GLOBAL -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">

    <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500">
      <p class="text-gray-500">Saldo Tahun Sebelumnya</p>
      <h2 id="saldoSebelumnya" class="text-xl font-bold">Rp 0</h2>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500">
      <p class="text-gray-500">Pemasukan Tahun Ini</p>
      <h2 id="ytdMasuk" class="text-xl font-bold text-green-600">Rp 0</h2>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500">
      <p class="text-gray-500">Pengeluaran Tahun Ini</p>
      <h2 id="ytdKeluar" class="text-xl font-bold text-red-600">Rp 0</h2>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500">
      <p class="text-gray-500">Saldo Kas Saat Ini</p>
      <h2 id="saldoAkhirGlobal" class="text-xl font-bold text-blue-600">Rp 0</h2>
    </div>

  </div>


  <!-- FILTER -->
  <div class="bg-white p-4 rounded-2xl shadow mb-4 flex gap-3 items-center flex-wrap">
    <span class="font-semibold">Periode:</span>
    <select id="bulanSelect" class="border rounded px-3 py-2"></select>
    <select id="tahunSelect" class="border rounded px-3 py-2"></select>
  </div>
  
  
  <!-- RINGKASAN BULAN -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-4 rounded-2xl shadow">
      <p class="text-gray-500">Pemasukan Bulan Ini</p>
      <h2 id="totalMasuk" class="text-xl font-bold text-green-600">Rp 0</h2>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <p class="text-gray-500">Pengeluaran Bulan Ini</p>
      <h2 id="totalKeluar" class="text-xl font-bold text-red-600">Rp 0</h2>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <p class="text-gray-500">Saldo Bulan Ini</p>
      <h2 id="saldoAkhir" class="text-xl font-bold">Rp 0</h2>
    </div>

  </div>

  <!-- TABEL -->
  <div class="bg-white rounded-2xl shadow overflow-x-auto">
    <table class="min-w-full text-sm text-left">
      <thead class="bg-gray-200 text-gray-700">
        <tr>
          <th class="px-4 py-2">No</th>
          <th class="px-4 py-2">Tanggal</th>
          <th class="px-4 py-2">Keterangan</th>
          <th class="px-4 py-2">Nominal</th>
          <th class="px-4 py-2">Saldo</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1qD47ciUC6vdhNM8IAW9netbEhsGL_eJsizituDNTdsQ/Sheet3";

let allData = [];

// FETCH DATA
fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    allData = data;
    initFilter();
    renderTable();
  });

// INIT DROPDOWN
function initFilter() {
  const bulanSelect = document.getElementById("bulanSelect");
  const tahunSelect = document.getElementById("tahunSelect");

  const bulanNama = [
    "Januari","Februari","Maret","April","Mei","Juni",
    "Juli","Agustus","September","Oktober","November","Desember"
  ];

  bulanNama.forEach((b, i) => {
    bulanSelect.innerHTML += `<option value="${i}">${b}</option>`;
  });

  const tahunSet = new Set();
  allData.forEach(row => {
    const t = new Date(row.TANGGAL).getFullYear();
    if (!isNaN(t)) tahunSet.add(t);
  });

  [...tahunSet].sort().forEach(t => {
    tahunSelect.innerHTML += `<option value="${t}">${t}</option>`;
  });

  const now = new Date();
  bulanSelect.value = now.getMonth();
  tahunSelect.value = now.getFullYear();

  bulanSelect.addEventListener("change", renderTable);
  tahunSelect.addEventListener("change", renderTable);
}

// RENDER
function renderTable() {

  const bulan = parseInt(document.getElementById("bulanSelect").value);
  const tahun = parseInt(document.getElementById("tahunSelect").value);

  let saldoSebelumnya = 0;
  let ytdMasuk = 0;
  let ytdKeluar = 0;

  // HITUNG GLOBAL
  allData.forEach(row => {
    const tanggal = new Date(row.TANGGAL);
    const dk = (row.DK || "").toUpperCase().trim();
    const nominal = parseInt(row.NOMINAL || 0);

    if (isNaN(tanggal)) return;

    if (tanggal.getFullYear() < tahun) {
      if (dk === "D") saldoSebelumnya += nominal;
      if (dk === "K") saldoSebelumnya -= nominal;
    }

    if (tanggal.getFullYear() === tahun && tanggal.getMonth() <= bulan) {
      if (dk === "D") ytdMasuk += nominal;
      if (dk === "K") ytdKeluar += nominal;
    }
  });

  const saldoAkhirGlobal = saldoSebelumnya + (ytdMasuk - ytdKeluar);

  // SET GLOBAL UI
  document.getElementById("saldoSebelumnya").innerText = "Rp " + saldoSebelumnya.toLocaleString();
  document.getElementById("ytdMasuk").innerText = "Rp " + ytdMasuk.toLocaleString();
  document.getElementById("ytdKeluar").innerText = "Rp " + ytdKeluar.toLocaleString();
  document.getElementById("saldoAkhirGlobal").innerText = "Rp " + saldoAkhirGlobal.toLocaleString();

  // RESET TABEL
  let totalMasuk = 0;
  let totalKeluar = 0;
  let saldo = saldoSebelumnya;
  let nomor = 1;

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  allData.forEach(row => {
    const tanggal = new Date(row.TANGGAL);

    if (tanggal.getMonth() !== bulan || tanggal.getFullYear() !== tahun) return;

    const dk = (row.DK || "").toUpperCase().trim();
    const nominal = parseInt(row.NOMINAL || 0);

    let warna = "";
    let simbol = "";

    if (dk === "D") {
      saldo += nominal;
      totalMasuk += nominal;
      warna = "text-green-600";
      simbol = "+";
    } else if (dk === "K") {
      saldo -= nominal;
      totalKeluar += nominal;
      warna = "text-red-600";
      simbol = "-";
    }

    table.innerHTML += `
      <tr class="border-b hover:bg-gray-50">
        <td class="px-4 py-2">${nomor++}</td>
        <td class="px-4 py-2">${row.TANGGAL}</td>
        <td class="px-4 py-2">${row.KETERANGAN}</td>
        <td class="px-4 py-2 font-semibold ${warna}">
          ${simbol} Rp ${nominal.toLocaleString()}
        </td>
        <td class="px-4 py-2 font-bold">
          Rp ${saldo.toLocaleString()}
        </td>
      </tr>
    `;
  });

  document.getElementById("totalMasuk").innerText = "Rp " + totalMasuk.toLocaleString();
  document.getElementById("totalKeluar").innerText = "Rp " + totalKeluar.toLocaleString();
  document.getElementById("saldoAkhir").innerText = "Rp " + (totalMasuk - totalKeluar).toLocaleString();
}

</script>

</body>
</html>
